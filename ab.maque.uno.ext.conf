# ab.maque.uno Web 端 SPA 部署配置
# 用法: 用户在宝塔添加站点 ab.maque.uno (PHP/纯静态均可) + 签 Let's Encrypt 证书后
#       scp 此文件到 /www/server/panel/vhost/nginx/extension/ab.maque.uno/web.conf
#       然后 nginx -s reload
#
# 宝塔主 conf (ab.maque.uno.conf) 会自动 include extension/ab.maque.uno/*.conf
# 静态资源: /www/wwwroot/ab.maque.uno/
# 后端反代: 127.0.0.1:6000 (PM2 ai-script-server)
# WebSocket: /ws → ws://127.0.0.1:6000/ws

# SPA fallback: 所有非文件请求走 index.html
# v3.0.0: 取消 index.html 缓存, 每次拉新 HTML 拿最新 bundle hash
# (但宝塔主 conf 自带 location /, 这个不会被加载 — 见下面注释)
# 实际生效在 /www/server/panel/vhost/nginx/ab.maque.uno.conf (line 117-122)

# 静态资源长缓存
location /assets/ {
    root /www/wwwroot/ab.maque.uno;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# favicon
location = /favicon.ico {
    root /www/wwwroot/ab.maque.uno;
    access_log off;
    log_not_found off;
}

# API 反代到后端
location /api/ {
    proxy_pass http://127.0.0.1:6000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering off;
    client_max_body_size 60M;
}

# WebSocket 反代
location /ws {
    proxy_pass http://127.0.0.1:6000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400s;
}

# gzip
gzip on;
gzip_min_length 1k;
gzip_comp_level 5;
gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
gzip_vary on;

# 日志
access_log /www/wwwlogs/ab.maque.uno.access.log;
error_log  /www/wwwlogs/ab.maque.uno.error.log;
