name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root devDependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: apps/server
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: apps/server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          cd ../../packages/shared-types && npm ci && npm run build
          cd ../shared-utils && npm ci && npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: apps/server/coverage

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -f apps/server/Dockerfile -t ai-script-server:latest .

      - name: Test Docker image
        run: |
          docker run -d -p 6000:6000 --name test-server ai-script-server:latest
          sleep 5
          curl -f http://localhost:6000/health || exit 1
          docker stop test-server
