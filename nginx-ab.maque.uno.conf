# ab.maque.uno nginx 配置 (宝塔可直接添加 site 后粘进去)
# - 静态 SPA: /www/wwwroot/ab.maque.uno/
# - API 反代: /api/* → http://127.0.0.1:6000/
# - WebSocket:  /ws  → ws://127.0.0.1:6000/ws

server {
    listen 80;
    server_name ab.maque.uno;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ab.maque.uno;

    # SSL (宝塔 Let's Encrypt 签后, 路径已固定)
    ssl_certificate     /www/server/panel/vhost/cert/ab.maque.uno/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/ab.maque.uno/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 静态资源
    root /www/wwwroot/ab.maque.uno;
    index index.html;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # 客户端最大 body (文件上传, 与后端 .env MAX_FILE_SIZE 对齐)
    client_max_body_size 60M;

    # SPA fallback: 非 /api 非 /assets 非 /ws 都走 index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # 静态资源长缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反代到后端 6000
    location /api/ {
        proxy_pass http://127.0.0.1:6000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # WebSocket 反代
    location /ws {
        proxy_pass http://127.0.0.1:6000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # 健康检查端点
    location = /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # 日志
    access_log /www/wwwlogs/ab.maque.uno.access.log;
    error_log  /www/wwwlogs/ab.maque.uno.error.log;
}
