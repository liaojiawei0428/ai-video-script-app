version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai-script-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: ai-script-server
    restart: unless-stopped
    ports:
      - "6000:6000"
    environment:
      - NODE_ENV=production
      - PORT=6000
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/app/data/app.db
      - UPLOAD_DIR=/app/uploads
      - DEEPSEEK_API_KEYS=${DEEPSEEK_API_KEYS}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - AI_MAX_CONCURRENT=${AI_MAX_CONCURRENT:-10}
      - CHUNK_CONCURRENT=${CHUNK_CONCURRENT:-10}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
