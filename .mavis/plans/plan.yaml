  - id: fix-aspect-and-ffmpeg
    title: '修 aspect ratio 兜底 + angle 硬编码 + ffmpeg perf + text part 注释'
    prompt: |
      项目根: F:\文档\其它\banmu\APP\ai-video-script-app
      必读: docs/notes/DEPLOYMENT_AND_BACKEND_RULES.md §8

      目标文件:
      - apps/server/src/services/imageAgentService.ts (副修, 不与别的 task 冲突)
      - apps/server/src/services/videoAgentService.ts (副修)
      - apps/server/src/utils/ffmpegHelper.ts (副修)

      **修复清单 (audit #10 #12 #13 #14)**:

      **#10 imageAgentService.ts L517 angle 硬编码**:
      `angle: 'comic'` 是写死。改方案:
      ```typescript
      angle: (plan as any).style || 'comic'  // v3.1.0: plan 加 style 字段从 UI 传过来
      ```
      + 加注释: `// v3.0.0 硬编码, 等 v3.1.0 跟前端确认 plan.style 取值范围`

      **#12 imageAgentService.ts L261 aspectRatio 兜底**:
      ```typescript
      const finalAspectRatio = aspectRatioFromClient || aspectRatioParsed || (conv.plan as any)?.aspectRatio || '1024x1024';
      ```
      改成 (跟 video 保持一致):
      ```typescript
      let finalAspectRatio = aspectRatioFromClient || aspectRatioParsed || (conv.plan as any)?.aspectRatio || '1024x1024';
      // 文字比例 (9:16/16:9 等) 兜底成 WxH, 跟 video 一致
      const dimsFromText = parseAspectToDims(finalAspectRatio);
      if (dimsFromText) finalAspectRatio = `${dimsFromText[0]}x${dimsFromText[1]}`;
      ```
      看 L500 已经有 `parseAspectToDims(plan.aspectRatio) || DEFAULT_IMG_DIM` 兜底 — 那行其实可以删 (新兜底已经统一了), **保留** (兜底 DEFAULT 是另一回事, 删了会丢 case)。只加 L261 的文字比例转换。

      **#13 ffmpegHelper.ts L75-94 probe 优化**:
      现在抽帧后**额外起 ffmpeg 进程** 拿 dimensions。改用 PNG IHDR 头读取:
      ```typescript
      // PNG 头: 8 bytes signature + IHDR chunk (4 bytes length + 4 bytes "IHDR" + 4 bytes width + 4 bytes height)
      const pngBuf = fs.readFileSync(tmpPng);
      // 跳过 8 bytes PNG signature, 然后 4 bytes length, 4 bytes "IHDR", 接下来 4+4 bytes W+H (big-endian)
      const w = pngBuf.readUInt32BE(16);
      const h = pngBuf.readUInt32BE(20);
      const dimensions = `${w}x${h}`;
      ```
      删 spawnSync 那一整段 (L75-94) + 删除 import { spawnSync } from 'child_process' (L13, 如果不再用) — 确认 spawnSync 全文无引用再删。

      **#14 videoAgentService.ts L184-193 日志 message 分 case**:
      现状: 用 "heavy aspectRatio downgraded" 描述所有降级, 包括文字比例 (9:16 → 768x1152)。改成:
      ```typescript
      if (finalAspect !== aspectRatio) {
        const isHeavy = VIDEO_HEAVY_RATIOS.has(aspectRatio);
        logger.info('VideoAgent: aspectRatio adjusted', {
          requested: aspectRatio,
          used: finalAspect,
          reason: isHeavy ? 'heavy-ratio-downgrade' : 'text-ratio-resolved',
          conversationId,
        });
      }
      ```

      **严禁**:
      - 改 processTurn / confirm 主逻辑
      - 改 add 跟 Lock 相关 (那是 fix-videocontrol-async-lock 的范围)
      - 改 ffmpegHelper 的 `vf` 表达式 (有 BUG 历史注释保护, 改了踩坑)
      - 加新依赖

      **完成后**:
      1. `cd apps/server && npx tsc --noEmit 2>&1 | head -50` — 0 错
      2. 写 deliverable.md 列 4 个修改点 + 测试建议 (人工浏览器看 imageAgent 选 9:16 比例, 应该走 768x1152)
