  - id: fix-videocontrol-async-lock
    title: 'video + image agent confirm 异步任务加锁, 清理重复 import / stale comment'
    prompt: |
      项目根: F:\文档\其它\banmu\APP\ai-video-script-app
      必读: docs/notes/DEPLOYMENT_AND_BACKEND_RULES.md (尤其 §7 异步任务无锁)

      目标文件:
      - apps/server/src/services/videoAgentService.ts (主修)
      - apps/server/src/services/imageAgentService.ts (副修, 不与 fix-imageagent-deadcode 冲突)

      **核心修复 (audit #6 P0)**: 异步任务加锁
      视频和图片的 `confirm()` 用了 `setImmediate(() => runXxxBackground(...).catch(...))`,
      没有 in-memory lock。**重复点 confirm 会触发多条 background 链**。

      实现方案:
      ```typescript
      // 类级别 (file-scope, 在 class 外)
      const backgroundLocks = new Map<string, Promise<void>>();

      // confirm() 调用 background 前:
      const existing = backgroundLocks.get(conversationId);
      if (existing) {
        throw new Error('上一个任务还在进行中, 请稍候');
        // 或: return { taskId: existingTaskId, status: 'queued' }; (复用)
      }
      const bgPromise = this.runXxxBackground(...).finally(() => {
        backgroundLocks.delete(conversationId);
      });
      backgroundLocks.set(conversationId, bgPromise);
      setImmediate(() => bgPromise.catch(err => logger.error(...)));
      ```

      两个 service 都要加。**image 的 background 签名是 `runImageGenerationBackground(conversationId, taskId, plan, lastResultUrl, amount)`, video 的是 `runCreateTaskInBackground(...)` (10 参) — 仔细对应**。

      **顺手修 (audit #7-#9)**:
      - **#7 重复 import**: apps/server/src/index.ts L43 `import { config as appConfig } from './config';` — 删 (L7 已 import 过)
      - **#8 videoAgentService L182**: `|| (conv.plan as any)?.aspectRatio` — 改走 `parsePlan(conv.plan)?.aspectRatio` (import parsePlan, 用 L63-69 已定义的)
      - **#9 videoAgentService L20-22 注释 / 代码不一致**: "保留 import 兼容其它文件可能的引用" + 实际 import 已注释 — 删整段 `// v3.0.0.28 (S48)...` 注释块 (L18-20)

      **严禁**:
      - 改 processTurn 主逻辑
      - 改 AGENTS.md / docs/notes/ (那是部署约束, 不属于这次修复)
      - 加新依赖
      - 改 confirm 里的 plan 构造 / 计费守门 / 错误回滚路径 — 保持原样

      **完成后**:
      1. `cd apps/server && npx tsc --noEmit 2>&1 | head -50` — 0 错
      2. 写 deliverable.md: 加锁策略 (新抛错 vs 复用) / 删除的重复 import / 修的 stale comment
      3. 报告修改清单
    assigned_to: coder
