  - id: fix-types-and-character
    title: '修 CharacterExtraDescription 类型不一致 + 11 维结构对齐'
    prompt: |
      项目根: F:\文档\其它\banmu\APP\ai-video-script-app
      必读: docs/notes/DEPLOYMENT_AND_BACKEND_RULES.md §5

      目标文件:
      - apps/server/src/shared/types.ts (L308 类型不一致)
      - apps/server/src/services/characterService.ts (定位实际用法)

      **Bug 描述 (audit #5)**:
      `shared/types.ts` L306-315 `CharacterV2Fields`:
      ```typescript
      export interface CharacterV2Fields {
        description?: CharacterDescription;
        extraDescription?: CharacterDescription;  // v2.5.34: 简化, 跟 description 同样类型
        ...
      }
      ```
      注释说"v2.5.34 简化, 跟 description 同样类型" — **错的**。L286-291 `CharacterExtraDescription` 是 4 维 (relationshipsText / emotionRange / actionHabits / signatureLines), 跟 `CharacterDescription` 11 维完全不一样。

      **修复流程**:
      1. `grep -rn "extraDescription" apps/server/src/` 看所有引用
      2. 读 `services/characterService.ts` 看 `extraDescription` 实际当成什么类型用
         - 关键搜索: `extraDescription\?: \?` / `extraDescription: {` / `Object.keys.*extraDescription` / `(character as any).extraDescription`
      3. 根据实际用法决定:
         - **情况 A**: characterService 把 extraDescription 当 4 维用 (relationshipsText 等) → types.ts L308 改成 `extraDescription?: CharacterExtraDescription` (用对的类型), 删错注释
         - **情况 B**: characterService 也当 11 维用 → types.ts L286-291 `CharacterExtraDescription` 删, 注释改成真话
         - **情况 C**: 两边都不严格, 用 `any` 兜底 → 把 types.ts L308 改 `extraDescription?: CharacterDescription | CharacterExtraDescription`, 注释说明
      4. 同步 `EpisodeV2Fields.characterDescriptions` (L424) 看是否要改 (大概率 OK, 是数组, 跟 extraDescription 是不同字段)

      **额外检查**:
      - L262-267 那段 v2.5.34 失败回退注释 — 留着, 是历史
      - 看 `models/character.ts` (如果有) DB schema 有没有 mismatch

      **严禁**:
      - 改 characterService 业务逻辑 (这次只对 types)
      - 加新依赖
      - 改 L262-267 历史注释 (那是考古记录)
      - 删 CharacterExtraDescription 整个定义 (除非情况 B 确认了, 而且要 grep 全 src 看无引用)

      **完成后**:
      1. `cd apps/server && npx tsc --noEmit 2>&1 | head -50` — 0 错
      2. 写 deliverable.md: 选了 A/B/C 哪条路径, 改了哪几行, 跑了哪些 grep 验证
      3. 如果选了 B 删了 CharacterExtraDescription, 列所有引用点确认无残留
