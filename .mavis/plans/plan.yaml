      3. 检查 lock 删除: `grep -n "backgroundLocks.delete" src/services/*.ts` — finally 块清理
      4. 检查 index.ts 重复 import 已删: `grep -n "from './config'" src/index.ts` — 应只 1 行 (L7)
      5. 检查 videoAgentService L182 已走 parsePlan: 看 line 182 附近是否用 `parsePlan(conv.plan)?.aspectRatio`
      6. **并发行为测试** (写临时 .mavis/plans/concurrent_test.ts):
         ```typescript
